stappen:
  - stap: 1
    maand: Juli
    titel: Bomen scouten
    omschrijving: We brengen appelbomen in kaart bij eigenaren in Zweeloo en Aalden die meer appels hebben dan ze kunnen gebruiken.
    emoji: 🗺️
    foto: /images/uploads/IMG_8115-1.jpeg
    foto_alt: Vrijwilliger noteert appelbomen op een kaart
  - stap: 2
    maand: September
    titel: Plukdag
    omschrijving: Op een zonnige septemberochtend trekken we er met z'n allen op uit. Ladders, manden, en goede zin.
    emoji: 🧺
    foto: /images/uploads/3B64476F-6A92-4E57-A41D-ECD39E805429_1_105_c.jpeg
    foto_alt: Vrijwilligers plukken appels uit een appelboom
  - stap: 3
    maand: September
    titel: Inzamelen
    omschrijving: Wie thuis appels heeft liggen, brengt ze naar het inzamelpunt bij Annemarie. Elke appel telt.
    emoji: 🏡
    foto: /images/uploads/Cees-met-doos-appels.jpg
    foto_alt: Manden vol appels bij het inzamelpunt
  - stap: 4
    maand: Oktober
    titel: Schillen & koken
    omschrijving: 'De gezelligste middagen van het jaar: samen schillen, snijden en koken bij het Korenhof in Aalden.'
    emoji: 🔪
    foto: /images/uploads/IMG_8127-1.jpeg
    foto_alt: Vrijwilligers schillen appels aan tafel in het Korenhof
  - stap: 5
    maand: Oktober
    titel: Potten vullen
    omschrijving: De warme moes gaat in potjes, die daarna worden gelabeld en klaargemaakt voor de verkoop.
    emoji: 🍯
    foto: /images/uploads/IMG_8128-1.jpeg
    foto_alt: Potjes appelmoes worden gevuld en gelabeld
  - stap: 6
    maand: November
    titel: Verkopen
    omschrijving: Op de markt en bij de PLUS in Aalden verkopen we de potjes. De opbrengst gaat naar het goede doel.
    emoji: 🛒
    foto: /images/uploads/C09B98D7-8FED-4804-889F-B8F657718530-1.jpeg
    foto_alt: Verkoopkraam met appelmoes en jam bij de PLUS
  - stap: 7
    maand: December
    titel: Donatie
    omschrijving: De volledige opbrengst gaat naar een lokaal goed doel. Elk jaar kiezen we samen wie dat doel is.
    emoji: 🎯
    foto: /images/uploads/bijdrage-AaldenRondomme-en-Gedichtenroute.jpg
    foto_alt: Werkgroep overhandigt donatie aan het goede doel
